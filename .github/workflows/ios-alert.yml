name: iOS Update Alert

on:
  schedule:
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch:

concurrency:
  group: ios-update-alert
  cancel-in-progress: false

jobs:
  check-ios-update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔍 Vérifier les mises à jour iOS
        env:
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL:      ${{ secrets.TO_EMAIL }}
          FREE_USER:     ${{ secrets.FREE_USER }}
          FREE_API_KEY:  ${{ secrets.FREE_API_KEY }}
        run: python3 check_ios_update.py

      - name: 💾 Sauvegarder le cache dans le repo
        run: |
          git config user.name "iOS Update Alert Bot"
          git config user.email "actions@github.com"
          git add last_known_version.json
          if git diff --cached --quiet; then
            echo "✅ Pas de changement à sauvegarder"
            exit 0
          fi
          git commit -m "🔄 Mise à jour cache version [skip ci]"
          git pull --rebase origin main
          git push origin main
